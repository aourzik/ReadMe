name: readme_app
description: ReadMe — bibliothèque personnelle & sociale
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.3
  http: ^1.2.1

  # Local storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Barcode scanner
  mobile_scanner: ^5.0.0

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: CormorantGaramond
      fonts:
        - asset: assets/fonts/Cormorant-VariableFont_wght.ttf
        - asset: assets/fonts/Cormorant-Italic-VariableFont_wght.ttf
          style: italic
